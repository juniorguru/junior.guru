reminders:
  - control_emoji: "👋"
    channel_id: NEWCOMERS
    content_template: >-
      Ahoj! Toto je speciální kanál, který vidí jen **nově příchozí** jako ty a **moderátoři**. Pokud není jasné, jak něco funguje, neboj se tady zeptat. Rádi poradíme, nasměrujeme. Žádná otázka není blbá! Každý den sem posílám jeden tip, který by měl pomoci s orientací v klubu. Všechny najdeš tady: <#TIPS>
    period_days: 7

  - control_emoji: "💡"
    channel_id: INTRO
    content_template: >-
      Proč je dobré se představit ostatním a co vůbec napsat? Přečti si klubový tip {👋}
    period_days: 30

  - control_emoji: "🤝"
    channel_id: INTERVIEWS
    content_template: >-
      Pravidelná upomínka pro všechny <@&CANDIDATE>, že v tomhle připnutém příspěvku bývají vypsané inzeráty, které přidali přímo členové klubu: https://discord.com/channels/769966886598737931/1339926102692335657/1339926102692335657
    period_days: 7

  - control_emoji: "<:youtube:976200175490060299>"
    channel_id: RESOURCES
    content_template: >-
      Nezapomeň, že v <#RESOURCES> najdeš všechny videozáznamy klubových akcí. Mrkni i na starší věci. Třeba narazíš na něco, co se ti zrovna bude hodit!
    period_days: 30
