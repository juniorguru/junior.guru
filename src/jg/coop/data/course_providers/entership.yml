usp_description: |
  Nejviditelnější postavou je [Petr Glaser](https://www.linkedin.com/in/bleedingdev/), který se původně dostal do povědomí hlavně jako nadšenec do nejčerstvějších frontendových technologií (jeho přezdívka _BleedingDev_ vychází ze slovního spojení [bleeding edge](https://en.wikipedia.org/wiki/Emerging_technologies#Bleeding_edge)). Na Discordu používá přezdívku _Pegak_.

  Po roce 2023 se jeho nadšení přesměrovalo na AI, což spolu s krizí na trhu práce pro juniory přispělo k přehodnocení zaměření projektu.

  Projekt původně vznikl pod názvem „Nauč mě IT“ (IČO 17321743) a pomáhal začínajícím testerům a programátorům s rozjezdem kariéry v IT.

  Na přelomu let 2025 a 2026 došlo k obměně jednoho ze tří zakladatelů, projekt se přejmenoval na „Entership“ a začal se soustředit na rozvoj AI dovedností.
