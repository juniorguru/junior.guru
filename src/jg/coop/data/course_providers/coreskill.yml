usp_description: |
  CoreSkill je mentoring od Daniela Srba a Kate Mihálikové. Za hodinovou sazbu poskytují komplexní individuální konzultace ke změně kariéry do IT.

  Dříve šlo o celý mentoringový program, který se soustředil na frontendový vývoj od úplných začátků, až po získání první práce, a to včetně kariérní podpory. Program fungoval v letech 2017-2024, potom byl pozastaven ze zdravotních důvodů. Mezitím se trh proměnil natolik, že se jej Daniel a Kate rozhodli v původní podobě neobnovovat.
