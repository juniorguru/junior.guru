usp_description: |
  CoreSkill byl placený mentoring od Daniela Srba a Kate Mihálikové, který se soustředil na frontendový vývoj. Absolventům typicky pomáhali až do okamžiku sehnání první práce, takže součástí byla i kariérní podpora.

  Mentoring fungoval od roku 2017 a prošly jím tři desítky klientů. V roce 2024 byl pozastaven ze zdravotních důvodů. Mezitím se trh proměnil natolik, že se jej Daniel a Kate rozhodli v původní podobě neobnovovat.
